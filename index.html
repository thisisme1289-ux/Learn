<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Spanish Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--g:#58cc02;--gd:#46a302;--b:#1cb0f6;--r:#ff4b4b;--bg:#f0f4f8;--card:#fff;--text:#2d2d2d;--muted:#888;--brd:#dde3ea}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#home{background:linear-gradient(150deg,#1cb0f6,#0060b0)}
.hero{padding:44px 20px 28px;text-align:center;color:#fff}
.hero .flag{font-size:56px;margin-bottom:10px}
.hero h1{font-size:26px;font-weight:800;margin-bottom:4px}
.hero p{font-size:13px;opacity:.8}
.parts-wrap{background:var(--bg);border-radius:24px 24px 0 0;flex:1;padding:20px 16px 48px;margin-top:-2px}
.parts-wrap h2{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.part-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;border:2px solid var(--brd);transition:border-color .15s,transform .1s;user-select:none}
.part-card:active{transform:scale(.97);border-color:var(--b)}
.pbadge{width:46px;height:46px;border-radius:12px;color:#fff;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pinfo h3{font-size:15px;font-weight:700;margin-bottom:2px}
.pinfo span{font-size:12px;color:var(--muted)}
.parrow{margin-left:auto;color:#ccc;font-size:22px}
#chapters{background:var(--bg)}
.topbar{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:10}
.back{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text);padding:2px 10px 2px 0;line-height:1}
.topbar h2{font-size:17px;font-weight:700}
.ch-list{padding:14px 16px 48px}
.ch-card{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--brd);transition:transform .1s;user-select:none}
.ch-card:active{transform:scale(.97)}
.ch-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ch-info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.ch-info span{font-size:12px;color:var(--muted)}
.ch-score{margin-left:auto;font-size:12px;font-weight:700;color:var(--g);white-space:nowrap}
#quiz{background:var(--bg)}
.qhdr{background:#fff;padding:12px 16px 10px;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:10}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.qtitle{font-size:12px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qnum{font-size:13px;font-weight:700;color:var(--b);white-space:nowrap}
.pbar{height:8px;background:var(--brd);border-radius:99px;overflow:hidden}
.pfill{height:100%;background:var(--g);border-radius:99px;transition:width .3s}
.qbody{padding:18px 16px 28px;flex:1;display:flex;flex-direction:column}
.badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;border-radius:99px;margin-bottom:12px;align-self:flex-start}
.b-es{background:#ddf0ff;color:#0070c0}
.b-en{background:#fff3d0;color:#b06000}
.b-sent{background:#e8fff0;color:#007830}
.b-fill{background:#f0eeff;color:#5030b0}
.b-tf{background:#fff0e8;color:#c04000}
.qword{font-size:30px;font-weight:800;text-align:center;margin:4px 0 6px;line-height:1.3;word-break:break-word}
.qsent{font-size:18px;font-weight:700;text-align:center;margin:4px 0 6px;line-height:1.5;word-break:break-word;color:#1a1a3a;background:#f0f4ff;border-radius:10px;padding:12px 14px}
.qhint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:18px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.opt{background:#fff;border:2px solid var(--brd);border-radius:12px;padding:13px 10px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;line-height:1.35;min-height:54px;word-break:break-word;user-select:none;transition:border-color .1s,background .1s}
.opt:active{transform:scale(.95)}
.opt.sel{border-color:var(--b);background:#e0f3ff}
.opt.ok{border-color:var(--g)!important;background:#e0ffe8!important;color:var(--gd)!important}
.opt.no{border-color:var(--r)!important;background:#ffe0e0!important;color:var(--r)!important}
.opts.wide{grid-template-columns:1fr}
.opts.wide .opt{min-height:auto;text-align:left;padding:12px 14px}
.tinp{width:100%;border:2px solid var(--brd);border-radius:12px;padding:15px 16px;font-size:17px;font-weight:600;outline:none;background:#fff;margin-bottom:12px}
.tinp:focus{border-color:var(--b)}
.tinp.ok{border-color:var(--g);background:#e0ffe8}
.tinp.no{border-color:var(--r);background:#ffe0e0}
.sent-box{background:#f0f4ff;border:1px solid #c8d4f0;border-radius:12px;padding:14px 16px;margin-bottom:14px}
.sent-box .es-line{font-size:16px;font-weight:700;color:#1a1a3a;line-height:1.5;margin-bottom:6px;word-break:break-word}
.sent-box .en-line{font-size:13px;color:var(--muted);line-height:1.4;word-break:break-word}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0 12px}
.tf-btn{background:#fff;border:2px solid var(--brd);border-radius:14px;padding:18px;font-size:20px;font-weight:800;cursor:pointer;text-align:center;user-select:none;transition:border-color .1s,background .1s}
.tf-btn:active{transform:scale(.95)}
.tf-btn.sel{border-color:var(--b);background:#e0f3ff}
.tf-btn.ok{border-color:var(--g)!important;background:#e0ffe8!important}
.tf-btn.no{border-color:var(--r)!important;background:#ffe0e0!important}
.fb{border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;margin-bottom:12px;display:none;line-height:1.5;word-break:break-word}
.fb.ok{background:#e0ffe8;color:var(--gd);display:block}
.fb.no{background:#ffe0e0;color:var(--r);display:block}
.abtn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s;margin-top:auto}
.abtn:active{transform:scale(.98)}
.abtn.check{background:var(--g);color:#fff}
.abtn.next{background:var(--b);color:#fff}
.abtn:disabled{opacity:.35;cursor:default;transform:none}
#result{align-items:center;justify-content:center;padding:28px 20px}
.rcard{background:#fff;border-radius:20px;padding:30px 22px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.rtrophy{font-size:64px;margin-bottom:10px}
.rtitle{font-size:22px;font-weight:800;margin-bottom:10px}
.rscore{font-size:52px;font-weight:900;color:var(--g);line-height:1}
.rlabel{font-size:14px;color:var(--muted);margin:4px 0 18px}
.rstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat{background:var(--bg);border-radius:12px;padding:12px 8px}
.stat .n{font-size:22px;font-weight:800}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px}
.stat.g .n{color:var(--g)}
.stat.r .n{color:var(--r)}
.rbtn{width:100%;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.rbtn:active{transform:scale(.97)}
.rbtn.primary{background:var(--g);color:#fff}
.rbtn.sec{background:var(--bg);color:var(--text);border:2px solid var(--brd)}
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="hero">
    <div class="flag">&#127466;&#127480;</div>
    <h1>Spanish Practice</h1>
    <p>Duolingo vocab &middot; 50 questions per chapter</p>
  </div>
  <div class="parts-wrap">
    <h2>Choose a Part</h2>
    <div id="parts-list"></div>
  </div>
</div>

<div id="chapters" class="screen">
  <div class="topbar">
    <button class="back" onclick="showHome()">&#8592;</button>
    <h2 id="ch-title"></h2>
  </div>
  <div class="ch-list" id="ch-list"></div>
</div>

<div id="quiz" class="screen">
  <div class="qhdr">
    <div class="qmeta">
      <button class="back" onclick="exitQuiz()">&#10005;</button>
      <span class="qtitle" id="qtitle"></span>
      <span class="qnum" id="qnum"></span>
    </div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
  <div class="qbody" id="qbody"></div>
</div>

<div id="result" class="screen">
  <div class="rcard">
    <div class="rtrophy" id="rtrophy"></div>
    <div class="rtitle" id="rtitle"></div>
    <div class="rscore" id="rscore"></div>
    <div class="rlabel" id="rlabel"></div>
    <div class="rstats">
      <div class="stat g"><div class="n" id="rc"></div><div class="l">Correct &#10003;</div></div>
      <div class="stat r"><div class="n" id="rw"></div><div class="l">Wrong &#10007;</div></div>
      <div class="stat"><div class="n" id="rtot"></div><div class="l">Questions</div></div>
      <div class="stat"><div class="n" id="rpct"></div><div class="l">Score %</div></div>
    </div>
    <button class="rbtn primary" id="rretry">Try Again &#128260;</button>
    <button class="rbtn sec" onclick="showChapters()">Back to Chapters</button>
    <button class="rbtn sec" onclick="showHome()">Home</button>
  </div>
</div>

function sKey(p,c){return p+'||'+c}

function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}

function cleanEN(s){
  return String(s).replace(/^"+|"+$/g,'').split(',')[0].trim();
}

function isJunk(w){
  if(!w||!w.es||!w.en) return true;
  var es=w.es.trim(), en=w.en.trim();
  if(es.length<2||en.length<2) return true;
  if(es.toLowerCase()===en.toLowerCase()) return true;
  if(/^\d/.test(es)) return true;
  return false;
}

function cleanWords(words){
  return words.filter(function(w){return !isJunk(w);}).map(function(w){
    return {es:w.es.trim(), en:cleanEN(w.en)};
  });
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function norm(s){
  return String(s).trim().toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i')
    .replace(/[óòö]/g,'o').replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9 ]/g,'');
}

function setScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showHome(){setScreen('home');renderParts();}

function renderParts(){
  var el=document.getElementById('parts-list');
  el.innerHTML='';
  Object.keys(VOCAB_DATA).forEach(function(part,i){
    var chs=VOCAB_DATA[part].chapters.length;
    var d=document.createElement('div');
    d.className='part-card';
    d.innerHTML='<div class="pbadge" style="background:'+COLORS[i]+'">'+(i+1)+'</div>'
      +'<div class="pinfo"><h3>'+esc(part)+'</h3><span>'+chs+' chapters &middot; '+(chs*50)+' questions</span></div>'
      +'<span class="parrow">&#8250;</span>';
    d.onclick=function(){showChapterList(part,i);};
    el.appendChild(d);
  });
}

function showChapterList(part,ci){
  curPart=part;
  document.getElementById('ch-title').textContent=part;
  var el=document.getElementById('ch-list');
  el.innerHTML='';
  VOCAB_DATA[part].chapters.forEach(function(ch,i){
    var key=sKey(part,ch.name);
    var best=scores[key];
    var words=cleanWords(ch.words);
    var d=document.createElement('div');
    d.className='ch-card';
    d.innerHTML='<div class="ch-ico" style="background:'+COLORS[ci||0]+'22;color:'+COLORS[ci||0]+'">'+(ICONS[i%ICONS.length]||'📖')+'</div>'
      +'<div class="ch-info"><h4>'+esc(ch.name)+'</h4><span>'+words.length+' words</span></div>'
      +(best!==undefined?'<span class="ch-score">'+best+'%</span>':'');
    d.onclick=function(){startQuiz(part,i);};
    el.appendChild(d);
  });
  setScreen('chapters');
}

function showChapters(){
  showChapterList(curPart,Object.keys(VOCAB_DATA).indexOf(curPart));
}

function buildQuestions(chIdx){
  var part=VOCAB_DATA[curPart];
  var ch=part.chapters[chIdx];
  var allWords=cleanWords(part.all_words);
  var chWords=cleanWords(ch.words);
  if(!chWords.length) return [];

  var tpls=getTpls(ch.name);
  var pool=shuffle(chWords.concat(chWords,chWords,chWords,chWords,chWords));
  var pi=0;

  function nextWord(){
    var w=pool[pi%pool.length]; pi++;
    return w;
  }

  var qs=[];
  // 50 questions: types cycle 0-4 (10 each)
  // 0=mcq-es, 1=mcq-en, 2=sent-mcq, 3=sent-fill, 4=sent-tf
  for(var qi=0;qi<50;qi++){
    var type=qi%5;
    var word=nextWord();
    var dists=shuffle(allWords.filter(function(w){return w.es!==word.es;})).slice(0,3);

    if(type===0){
      // Word MCQ: see Spanish, pick English
      qs.push({type:'mcq-es',prompt:word.es,answer:word.en,opts:shuffle([word.en].concat(dists.map(function(d){return d.en;}))),word:word});
    } else if(type===1){
      // Word MCQ: see English, pick Spanish
      qs.push({type:'mcq-en',prompt:word.en,answer:word.es,opts:shuffle([word.es].concat(dists.map(function(d){return d.es;}))),word:word});
    } else if(type===2){
      // Sentence MCQ: full Spanish sentence shown, pick English meaning
      var tpl=tpls[qi%tpls.length];
      var esSent=tpl.es.replace('_W_',word.es);
      var enSent=tpl.en.replace('_E_',word.en);
      var wrongOpts=dists.map(function(d){return tpl.en.replace('_E_',d.en);});
      qs.push({type:'sent-mcq',prompt:esSent,answer:enSent,opts:shuffle([enSent].concat(wrongOpts)),word:word});
    } else if(type===3){
      // Sentence fill: English sentence shown, type missing Spanish word
      var tpl2=tpls[qi%tpls.length];
      var esBlank=tpl2.es.replace('_W_','___');
      var enFull=tpl2.en.replace('_E_',word.en);
      qs.push({type:'sent-fill',esWithBlank:esBlank,enSentence:enFull,prompt:word.en,answer:word.es,word:word});
    } else {
      // Sentence True/False
      var tpl3=tpls[qi%tpls.length];
      var isCorrect=Math.random()>0.5;
      var esFull=tpl3.es.replace('_W_',word.es);
      var correctEN=tpl3.en.replace('_E_',word.en);
      var shownEN=isCorrect?correctEN:tpl3.en.replace('_E_',(dists[0]||word).en);
      qs.push({type:'sent-tf',esSentence:esFull,shownEN:shownEN,answer:isCorrect?'true':'false',correctEN:correctEN,word:word});
    }
  }
  return qs;
}

function startQuiz(part,chIdx){
  curPart=part; curChIdx=chIdx;
  questions=buildQuestions(chIdx);
  if(!questions.length){alert('No words available!');return;}
  qIdx=0; correct=0; wrong=0; answered=false; selOpt=null;
  var ch=VOCAB_DATA[part].chapters[chIdx];
  document.getElementById('qtitle').textContent=part+' · '+ch.name;
  setScreen('quiz');
  renderQ();
}

function renderQ(){
  var q=questions[qIdx];
  var tot=questions.length;
  document.getElementById('qnum').textContent=(qIdx+1)+' / '+tot;
  document.getElementById('pfill').style.width=(qIdx/tot*100)+'%';
  answered=false; selOpt=null;

  var META={
    'mcq-es':  ['Word','b-es','What does this Spanish word mean?'],
    'mcq-en':  ['Word','b-en','Which Spanish word matches this?'],
    'sent-mcq':['Sentence','b-sent','What does this Spanish sentence mean?'],
    'sent-fill':['Fill in','b-fill','Complete the Spanish sentence'],
    'sent-tf': ['True / False','b-tf','Is this translation correct?']
  };
  var m=META[q.type];
  var label=m[0], bcls=m[1], instruct=m[2];

  var html='<span class="badge '+bcls+'">'+label+'</span>';

  if(q.type==='mcq-es'||q.type==='mcq-en'){
    html+='<div class="qword">'+esc(q.prompt)+'</div>'
      +'<div class="qhint">'+esc(instruct)+'</div>'
      +'<div class="opts">';
    q.opts.forEach(function(o,i){
      html+='<button class="opt" id="o'+i+'" data-val="'+esc(o)+'" onclick="pickOpt(this)">'+esc(o)+'</button>';
    });
    html+='</div>';

  } else if(q.type==='sent-mcq'){
    html+='<div class="qsent">'+esc(q.prompt)+'</div>'
      +'<div class="qhint">'+esc(instruct)+'</div>'
      +'<div class="opts wide">';
    q.opts.forEach(function(o,i){
      html+='<button class="opt" id="o'+i+'" data-val="'+esc(o)+'" onclick="pickOpt(this)">'+esc(o)+'</button>';
    });
    html+='</div>';

  } else if(q.type==='sent-fill'){
    html+='<div class="sent-box">'
        +'<div class="es-line">'+esc(q.esWithBlank)+'</div>'
        +'<div class="en-line">&#127468;&#127463; '+esc(q.enSentence)+'</div>'
      +'</div>'
      +'<div class="qhint">Type the missing Spanish word for: <b>'+esc(q.prompt)+'</b></div>'
      +'<input class="tinp" id="tinp" type="text" '
        +'autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" '
        +'placeholder="Type in Spanish..." '
        +'oninput="onType()" onkeydown="handleEnter(event)">';

  } else if(q.type==='sent-tf'){
    html+='<div class="qhint" style="margin-bottom:12px">'+esc(instruct)+'</div>'
      +'<div class="sent-box">'
        +'<div class="es-line">&#127466;&#127480; '+esc(q.esSentence)+'</div>'
        +'<div class="en-line">&#127468;&#127463; '+esc(q.shownEN)+'</div>'
      +'</div>'
      +'<div class="qhint">Is this English translation correct?</div>'
      +'<div class="tf-btns">'
        +'<button class="tf-btn" data-val="true" onclick="pickTF(this)">&#10003; True</button>'
        +'<button class="tf-btn" data-val="false" onclick="pickTF(this)">&#10007; False</button>'
      +'</div>';
  }

  var needDisable=(q.type==='mcq-es'||q.type==='mcq-en'||q.type==='sent-mcq'||q.type==='sent-tf');
  html+='<div class="fb" id="fb"></div>'
    +'<button class="abtn check" id="abtn" onclick="doSubmit()"'+(needDisable?' disabled':'')+'>Check</button>';

  document.getElementById('qbody').innerHTML=html;
  if(q.type==='sent-fill'){
    setTimeout(function(){var t=document.getElementById('tinp');if(t)t.focus();},100);
  }
}

function handleEnter(e){if(e.key==='Enter')doSubmit();}

function pickOpt(btn){
  if(answered) return;
  selOpt=btn.getAttribute('data-val');
  document.querySelectorAll('.opt').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  document.getElementById('abtn').disabled=false;
}

function pickTF(btn){
  if(answered) return;
  selOpt=btn.getAttribute('data-val');
  document.querySelectorAll('.tf-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  document.getElementById('abtn').disabled=false;
}

function onType(){
  var t=document.getElementById('tinp');
  document.getElementById('abtn').disabled=!t.value.trim();
}

function doSubmit(){
  if(answered){nextQ();return;}
  var q=questions[qIdx];
  var isOk=false;
  var fb=document.getElementById('fb');
  var btn=document.getElementById('abtn');

  if(q.type==='mcq-es'||q.type==='mcq-en'||q.type==='sent-mcq'){
    isOk=norm(selOpt||'')===norm(q.answer);
    document.querySelectorAll('.opt').forEach(function(b){
      if(norm(b.getAttribute('data-val'))===norm(q.answer)) b.classList.add('ok');
      else if(b.classList.contains('sel')&&!isOk) b.classList.add('no');
    });
    fb.innerHTML=isOk?'&#10003; Correct!':'&#10007; Answer: <b>'+esc(q.answer)+'</b>';

  } else if(q.type==='sent-fill'){
    var t=document.getElementById('tinp');
    isOk=norm(t.value)===norm(q.answer);
    t.classList.add(isOk?'ok':'no');
    t.disabled=true;
    fb.innerHTML=isOk?'&#10003; Correct!':'&#10007; The word is: <b>'+esc(q.answer)+'</b>';

  } else if(q.type==='sent-tf'){
    isOk=selOpt===q.answer;
    document.querySelectorAll('.tf-btn').forEach(function(b){
      if(b.getAttribute('data-val')===q.answer) b.classList.add('ok');
      else if(b.classList.contains('sel')&&!isOk) b.classList.add('no');
    });
    if(isOk){
      fb.innerHTML=q.answer==='true'?'&#10003; Correct! The translation is right.':'&#10003; Correct! That translation was wrong.';
    } else {
      fb.innerHTML='&#10007; Correct English: <b>'+esc(q.correctEN)+'</b>';
    }
  }

  answered=true;
  if(isOk) correct++; else wrong++;
  fb.className='fb '+(isOk?'ok':'no');
  btn.textContent=qIdx<questions.length-1?'Continue \u2192':'See Results \u2192';
  btn.className='abtn next';
  btn.disabled=false;
}

function nextQ(){qIdx++;if(qIdx>=questions.length)showResult();else renderQ();}

function showResult(){
  var tot=questions.length;
  var pct=Math.round(correct/tot*100);
  var key=sKey(curPart,VOCAB_DATA[curPart].chapters[curChIdx].name);
  if(scores[key]===undefined||pct>scores[key]){scores[key]=pct;saveScores();}
  document.getElementById('rtrophy').textContent=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'📖';
  document.getElementById('rtitle').textContent=pct>=90?'Excellent!':pct>=70?'Good job!':pct>=50?'Keep it up!':'Keep going!';
  document.getElementById('rscore').textContent=correct;
  document.getElementById('rlabel').textContent='out of '+tot+' correct';
  document.getElementById('rc').textContent=correct;
  document.getElementById('rw').textContent=wrong;
  document.getElementById('rtot').textContent=tot;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rretry').onclick=function(){startQuiz(curPart,curChIdx);};
  setScreen('result');
}

function exitQuiz(){if(confirm('Exit quiz? Progress will be lost.'))showChapters();}

showHome();

</script>
